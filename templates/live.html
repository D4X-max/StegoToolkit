<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StegoToolkit | Live Stream</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      :root {
        --bg: #07090f;
        --srf: #0d1117;
        --s2: #111827;
        --bdr: #1c2333;
        --bdr2: #253045;
        --cyan: #00f5ff;
        --violet: #bf5af2;
        --green: #30d158;
        --orange: #ff9f0a;
        --red: #ff453a;
        --text: #e8edf5;
        --sub: #6b7c93;
        --faint: #1a2332;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 3px,
          rgba(0, 0, 0, 0.05) 3px,
          rgba(0, 0, 0, 0.05) 4px
        );
      }
      .blob {
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        z-index: 0;
        filter: blur(80px);
      }
      .b1 {
        width: 500px;
        height: 500px;
        background: rgba(0, 245, 255, 0.04);
        top: -100px;
        left: -100px;
      }
      .b2 {
        width: 400px;
        height: 400px;
        background: rgba(191, 90, 242, 0.04);
        bottom: -80px;
        right: -80px;
      }
      ::-webkit-scrollbar {
        width: 3px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--bdr2);
        border-radius: 3px;
      }

      nav {
        position: relative;
        z-index: 10;
        flex-shrink: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 36px;
        background: rgba(7, 9, 15, 0.95);
        backdrop-filter: blur(24px);
        border-bottom: 1px solid var(--bdr);
      }
      .nav-l {
        display: flex;
        align-items: center;
        gap: 20px;
      }
      .back-link {
        display: flex;
        align-items: center;
        gap: 7px;
        text-decoration: none;
        font-family: "DM Mono", monospace;
        font-size: 10px;
        color: var(--sub);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        transition: color 0.2s;
      }
      .back-link:hover {
        color: var(--text);
      }
      .page-ttl {
        font-family: "Bebas Neue", sans-serif;
        font-size: 20px;
        letter-spacing: 0.1em;
        color: var(--cyan);
        text-shadow: 0 0 20px rgba(0, 245, 255, 0.4);
      }
      .room-chip {
        display: flex;
        align-items: center;
        gap: 7px;
        background: rgba(0, 245, 255, 0.06);
        border: 1px solid rgba(0, 245, 255, 0.2);
        border-radius: 100px;
        padding: 5px 14px;
        font-family: "DM Mono", monospace;
        font-size: 10px;
        color: var(--cyan);
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .room-chip.inactive {
        background: rgba(107, 124, 147, 0.06);
        border-color: rgba(107, 124, 147, 0.2);
        color: var(--sub);
      }
      .live-badge {
        display: flex;
        align-items: center;
        gap: 7px;
        background: rgba(48, 209, 88, 0.07);
        border: 1px solid rgba(48, 209, 88, 0.2);
        border-radius: 100px;
        padding: 6px 14px;
      }
      .ring {
        width: 8px;
        height: 8px;
        position: relative;
      }
      .ring span {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: var(--green);
      }
      .ring span:first-child {
        animation: ping 1.4s ease-in-out infinite;
        opacity: 0.5;
      }
      @keyframes ping {
        75%,
        100% {
          transform: scale(2.2);
          opacity: 0;
        }
      }
      .live-lbl {
        font-family: "DM Mono", monospace;
        font-size: 10px;
        color: var(--green);
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      /* ROOM GATE */
      #roomGate {
        position: relative;
        z-index: 1;
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
      }
      .gate-box {
        background: var(--srf);
        border: 1px solid var(--bdr);
        border-radius: 24px;
        padding: 48px;
        width: 100%;
        max-width: 440px;
        display: flex;
        flex-direction: column;
        gap: 24px;
        text-align: center;
      }
      .gate-icon {
        font-size: 40px;
        margin-bottom: 4px;
      }
      .gate-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 36px;
        letter-spacing: 0.06em;
        color: #fff;
      }
      .gate-sub {
        font-family: "DM Mono", monospace;
        font-size: 11px;
        color: var(--sub);
        line-height: 1.7;
        letter-spacing: 0.05em;
      }
      .gate-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .gate-input {
        width: 100%;
        background: var(--s2);
        border: 1px solid var(--bdr2);
        border-radius: 11px;
        padding: 12px 16px;
        color: var(--text);
        font-family: "DM Mono", monospace;
        font-size: 13px;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .gate-input::placeholder {
        text-transform: none;
        letter-spacing: 0.05em;
        color: var(--sub);
      }
      .gate-input:focus {
        border-color: var(--cyan);
        box-shadow: 0 0 0 3px rgba(0, 245, 255, 0.1);
      }
      .gate-input-plain {
        text-transform: none;
        letter-spacing: 0;
      }
      .gate-btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 13px;
        font-family: "Bebas Neue", sans-serif;
        font-size: 18px;
        letter-spacing: 0.12em;
        background: linear-gradient(135deg, #00b8cc, #0066ff);
        color: #fff;
        cursor: pointer;
        box-shadow: 0 4px 24px rgba(0, 245, 255, 0.2);
        transition:
          opacity 0.2s,
          box-shadow 0.2s;
      }
      .gate-btn:hover {
        opacity: 0.9;
        box-shadow: 0 4px 40px rgba(0, 245, 255, 0.35);
      }
      .codename-hint {
        font-family: "DM Mono", monospace;
        font-size: 9px;
        color: var(--sub);
        letter-spacing: 0.1em;
        margin-top: -12px;
      }

      /* MAIN GRID */
      .grid {
        position: relative;
        z-index: 1;
        flex: 1;
        overflow: hidden;
        display: grid;
        grid-template-columns: 1fr 320px;
        min-height: 0;
        display: none;
      }
      .grid.active {
        display: grid;
      }

      /* FEED */
      .feed-col {
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--bdr);
        min-height: 0;
      }
      .feed-hd {
        flex-shrink: 0;
        padding: 14px 24px;
        border-bottom: 1px solid var(--bdr);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .feed-hd-l {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .feed-hd-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 18px;
        letter-spacing: 0.08em;
      }
      .pkt-counter {
        font-family: "DM Mono", monospace;
        font-size: 10px;
        color: var(--sub);
        background: var(--srf);
        border: 1px solid var(--bdr2);
        border-radius: 8px;
        padding: 4px 10px;
      }
      .auto-toggle {
        display: flex;
        align-items: center;
        gap: 7px;
        font-family: "DM Mono", monospace;
        font-size: 10px;
        color: var(--sub);
        cursor: pointer;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        transition: color 0.2s;
      }
      .auto-toggle:hover {
        color: var(--text);
      }
      .auto-toggle.on {
        color: var(--green);
      }
      .toggle-pill {
        width: 28px;
        height: 16px;
        border-radius: 100px;
        border: 1px solid var(--bdr2);
        background: var(--faint);
        position: relative;
        transition: all 0.2s;
      }
      .toggle-pill::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--sub);
        transition: all 0.2s;
      }
      .auto-toggle.on .toggle-pill {
        background: rgba(48, 209, 88, 0.2);
        border-color: var(--green);
      }
      .auto-toggle.on .toggle-pill::after {
        background: var(--green);
        left: 14px;
      }

      #feed {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 10px;
        align-content: start;
      }
      .empty-feed {
        grid-column: 1/-1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 60px 20px;
        opacity: 0.25;
      }
      .empty-icon {
        font-size: 40px;
      }
      .empty-txt {
        font-family: "DM Mono", monospace;
        font-size: 10px;
        color: var(--sub);
        letter-spacing: 0.15em;
        text-transform: uppercase;
        text-align: center;
      }

      .pkt {
        position: relative;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--bdr2);
        cursor: pointer;
        transition:
          border-color 0.2s,
          transform 0.2s,
          box-shadow 0.2s;
        animation: pop 0.28s ease-out forwards;
      }
      .pkt:hover {
        border-color: rgba(0, 245, 255, 0.4);
        transform: translateY(-3px);
        box-shadow:
          0 8px 28px rgba(0, 0, 0, 0.5),
          0 0 16px rgba(0, 245, 255, 0.08);
      }
      @keyframes pop {
        from {
          opacity: 0;
          transform: scale(0.88);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .pkt img {
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
        display: block;
      }
      .pkt-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 30, 50, 0.8);
        backdrop-filter: blur(2px);
        opacity: 0;
        transition: opacity 0.2s;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }
      .pkt:hover .pkt-overlay {
        opacity: 1;
      }
      .pkt-icon {
        color: var(--cyan);
        font-size: 18px;
      }
      .pkt-lbl {
        font-family: "DM Mono", monospace;
        font-size: 8px;
        color: #fff;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .pkt-meta {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 5px 7px;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
      }
      .pkt-num {
        font-family: "DM Mono", monospace;
        font-size: 8px;
        color: var(--sub);
      }
      .pkt-sender {
        font-family: "DM Mono", monospace;
        font-size: 8px;
        color: var(--cyan);
        font-weight: 500;
      }

      /* COMPOSE */
      .compose {
        flex-shrink: 0;
        padding: 14px 20px;
        border-top: 1px solid var(--bdr);
        background: var(--srf);
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .compose-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .cmp-input {
        width: 100%;
        background: var(--s2);
        border: 1px solid var(--bdr2);
        border-radius: 10px;
        padding: 10px 14px;
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .cmp-input:focus {
        border-color: var(--cyan);
        box-shadow: 0 0 0 3px rgba(0, 245, 255, 0.08);
      }
      .carrier-btn {
        width: 100%;
        background: var(--s2);
        border: 1px dashed var(--bdr2);
        border-radius: 10px;
        padding: 9px 14px;
        color: var(--sub);
        font-family: "DM Mono", monospace;
        font-size: 10px;
        letter-spacing: 0.07em;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .carrier-btn:hover {
        border-color: var(--cyan);
        color: var(--text);
      }
      .cmp-textarea {
        width: 100%;
        background: var(--s2);
        border: 1px solid var(--bdr2);
        border-radius: 10px;
        padding: 10px 14px;
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        outline: none;
        resize: none;
        line-height: 1.6;
        transition: border-color 0.2s;
      }
      .cmp-textarea:focus {
        border-color: var(--cyan);
      }
      .send-btn {
        width: 100%;
        padding: 13px;
        border: none;
        border-radius: 11px;
        font-family: "Bebas Neue", sans-serif;
        font-size: 17px;
        letter-spacing: 0.14em;
        background: linear-gradient(135deg, #00b0cc, #0055ee);
        color: #fff;
        cursor: pointer;
        box-shadow: 0 4px 24px rgba(0, 245, 255, 0.2);
        transition:
          opacity 0.2s,
          transform 0.15s,
          box-shadow 0.2s;
      }
      .send-btn:hover {
        opacity: 0.9;
        box-shadow: 0 4px 40px rgba(0, 245, 255, 0.35);
      }
      .send-btn:active {
        transform: scale(0.99);
      }
      .send-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        box-shadow: none;
      }

      /* KERNEL */
      .kernel-col {
        display: flex;
        flex-direction: column;
        background: var(--srf);
        min-height: 0;
      }
      .kernel-hd {
        flex-shrink: 0;
        padding: 15px 20px;
        border-bottom: 1px solid var(--bdr);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .kernel-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 18px;
        letter-spacing: 0.1em;
        color: var(--cyan);
        text-shadow: 0 0 16px rgba(0, 245, 255, 0.3);
      }
      .kernel-clr {
        font-family: "DM Mono", monospace;
        font-size: 9px;
        color: var(--sub);
        background: none;
        border: none;
        cursor: pointer;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        transition: color 0.2s;
      }
      .kernel-clr:hover {
        color: var(--text);
      }
      #stream {
        flex: 1;
        overflow-y: auto;
        padding: 14px 18px;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .ke {
        display: flex;
        gap: 8px;
        font-family: "DM Mono", monospace;
        font-size: 10px;
        line-height: 1.5;
      }
      .kts {
        color: var(--bdr2);
        flex-shrink: 0;
      }
      .c-i {
        color: var(--cyan);
      }
      .c-s {
        color: var(--green);
      }
      .c-e {
        color: var(--red);
      }
      .c-w {
        color: var(--orange);
      }
      .c-v {
        color: var(--violet);
      }
      .decoded-box {
        background: rgba(48, 209, 88, 0.06);
        border: 1px solid rgba(48, 209, 88, 0.25);
        border-radius: 10px;
        padding: 12px 14px;
        margin: 4px 0;
        font-family: "DM Mono", monospace;
        font-size: 11px;
        color: #fff;
        word-break: break-all;
        line-height: 1.65;
        animation: fadeUp 0.25s ease-out;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .decoded-sender {
        font-size: 8px;
        color: var(--green);
        letter-spacing: 0.15em;
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      .event-line {
        font-family: "DM Mono", monospace;
        font-size: 10px;
        color: var(--sub);
        font-style: italic;
        padding: 3px 0;
      }
      .pkt-overlay .pkt-icon {
        cursor: pointer;
        transition: transform 0.2s;
      }
      .pkt-overlay .pkt-icon:hover {
        transform: scale(1.2);
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="blob b1"></div>
    <div class="blob b2"></div>

    <nav>
      <div class="nav-l">
        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Hub</a>
        <span class="page-ttl">Live Stego Stream</span>
      </div>
      <div style="display: flex; align-items: center; gap: 12px">
        <div id="roomChip" class="room-chip inactive">
          <i class="fas fa-door-open" style="font-size: 10px"></i> No Room
        </div>
        <div class="live-badge">
          <div class="ring"><span></span><span></span></div>
          <span class="live-lbl">Socket Active</span>
        </div>
      </div>
    </nav>

    <!-- ROOM GATE -->
    <div id="roomGate">
      <div class="gate-box">
        <div>
          <div class="gate-icon">📡</div>
          <div class="gate-title">Join a Channel</div>
          <p class="gate-sub">
            Enter a room code to join an existing covert channel, or create a
            new one. Only people in the same room will see your packets.
          </p>
        </div>
        <div class="gate-row">
          <div>
            <input
              class="gate-input"
              id="roomInput"
              placeholder="Room Code"
              maxlength="12"
            />
          </div>
          <div>
            <input
              class="gate-input gate-input-plain"
              id="codenameInput"
              placeholder="Codename (auto)"
            />
          </div>
        </div>
        <p class="codename-hint" id="codenameHint"></p>
        <input
          class="gate-input"
          id="aesKeyInput"
          placeholder="AES-256 Key for this session"
          type="password"
        />
        <button class="gate-btn" onclick="joinRoom()">
          <i class="fas fa-satellite-dish" style="margin-right: 8px"></i
          >Initialize Channel
        </button>
      </div>
    </div>

    <!-- MAIN GRID (shown after joining) -->
    <div class="grid" id="mainGrid">
      <div class="feed-col">
        <div class="feed-hd">
          <div class="feed-hd-l">
            <span class="feed-hd-title">Packet Feed</span>
            <span id="pktCnt" class="pkt-counter">0 Packets</span>
          </div>
          <div id="autoToggle" class="auto-toggle on" onclick="toggleAuto()">
            <div class="toggle-pill"></div>
            Auto-Decrypt
          </div>
        </div>
        <div id="feed">
          <div class="empty-feed" id="emptyFeed">
            <div class="empty-icon">📡</div>
            <div class="empty-txt">Awaiting incoming packets…</div>
          </div>
        </div>
        <div class="compose">
          <div class="compose-row">
            <button
              class="carrier-btn"
              onclick="document.getElementById('carrierIn').click()"
            >
              <span id="carrierLbl">Select carrier file</span>
              <i class="fas fa-file-import" style="font-size: 12px"></i>
            </button>

            <input
              id="carrierIn"
              type="file"
              accept="image/png,image/bmp,application/pdf"
              style="display: none"
              onchange="onCarrier(this)"
            />
            <input
              class="cmp-input"
              id="passDisplay"
              type="password"
              placeholder="AES key (set at join)"
              readonly
              style="opacity: 0.5; cursor: default"
            />
          </div>
          <textarea
            class="cmp-textarea"
            id="msgIn"
            rows="2"
            placeholder="Enter secret payload…"
          ></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendSecret()">
            <i class="fas fa-paper-plane" style="margin-right: 8px"></i>Execute
            Protocol Send
          </button>
          <input
            id="carrierIn"
            type="file"
            accept="image/png,image/bmp"
            style="display: none"
            onchange="onCarrier(this)"
          />
        </div>
      </div>

      <div class="kernel-col">
        <div class="kernel-hd">
          <span class="kernel-title">Kernel Stream</span
          ><button class="kernel-clr" onclick="clearStream()">Clear</button>
        </div>
        <div id="stream">
          <div class="ke">
            <span class="kts">--:--:--</span
            ><span class="c-i">System online.</span>
          </div>
        </div>
      </div>
    </div>

    <script>
      const socket = io();
      let myRoom = "",
        myCodename = "",
        myPass = "",
        autoDecrypt = true,
        pCount = 0;

      // ── CODENAME GENERATOR ────────────────────────────────────
      const ADJECTIVES = [
        "GHOST",
        "PHANTOM",
        "CIPHER",
        "SHADOW",
        "VECTOR",
        "ECHO",
        "NEXUS",
        "BINARY",
        "ROGUE",
        "STATIC",
      ];
      const NUMBERS = () => Math.floor(Math.random() * 90 + 10);
      function randCodename() {
        return (
          ADJECTIVES[Math.floor(Math.random() * ADJECTIVES.length)] +
          "-" +
          NUMBERS()
        );
      }

      window.onload = () => {
        const cn = randCodename();
        document.getElementById("codenameInput").placeholder = cn;
        document.getElementById("codenameHint").textContent =
          `Auto-assigned: ${cn}`;
      };

      // ── JOIN ROOM ─────────────────────────────────────────────
      function joinRoom() {
        const room = document
          .getElementById("roomInput")
          .value.trim()
          .toUpperCase();
        const codename =
          document.getElementById("codenameInput").value.trim().toUpperCase() ||
          document.getElementById("codenameInput").placeholder;
        const pass = document.getElementById("aesKeyInput").value.trim();

        if (!room) {
          alert("Enter a room code.");
          return;
        }
        if (!pass) {
          alert("Enter an AES session key.");
          return;
        }

        myRoom = room;
        myCodename = codename;
        myPass = pass;
        document.getElementById("passDisplay").value = pass;

        socket.emit("join_room", { room, codename });

        document.getElementById("roomGate").style.display = "none";
        document.getElementById("mainGrid").classList.add("active");
        const chip = document.getElementById("roomChip");
        chip.innerHTML = `<i class="fas fa-lock" style="font-size:10px"></i> ${room}`;
        chip.className = "room-chip";
        klog(`Joined channel ${room} as ${codename}.`, "s");
      }

      document.getElementById("roomInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("aesKeyInput").focus();
      });
      document
        .getElementById("aesKeyInput")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") joinRoom();
        });

      // ── SOCKET EVENTS ─────────────────────────────────────────
      socket.on("connect", () => klog("Secure tunnel established.", "s"));
      socket.on("room_joined", (d) =>
        klog(`Channel ${d.room} active. Identity: ${d.codename}`, "s"),
      );
      socket.on("room_event", (d) => {
        const s = document.getElementById("stream");
        const e = document.createElement("div");
        e.className = "event-line";
        e.textContent = `— ${d.message} —`;
        s.appendChild(e);
        s.scrollTop = s.scrollHeight;
      });

      // ── CARRIER ───────────────────────────────────────────────
      function onCarrier(inp) {
        const file = inp.files[0];
        const nm = file?.name || "Select carrier file";

        // Update the label text
        document.getElementById("carrierLbl").textContent =
          nm.length > 22 ? nm.slice(0, 19) + "…" : nm;

        // Check the file type for the log
        if (file && file.type === "application/pdf") {
          // Uses the 'v' (violet) class for a distinct "Secure Vault" look
          klog(`Carrier: ${nm} (PDF Vault detected)`, "v");
        } else if (file) {
          klog(`Carrier: ${nm} (Image LSB detected)`, "i");
        } else {
          klog("Select carrier file", "i");
        }
      }

      // ── AUTO-DECRYPT TOGGLE ───────────────────────────────────
      function toggleAuto() {
        autoDecrypt = !autoDecrypt;
        document
          .getElementById("autoToggle")
          .classList.toggle("on", autoDecrypt);
        klog(`Auto-decrypt: ${autoDecrypt ? "ON" : "OFF"}.`, "i");
      }

      // ── SEND ──────────────────────────────────────────────────
      async function sendSecret() {
        const msg = document.getElementById("msgIn").value.trim();
        const btn = document.getElementById("sendBtn");
        const fi = document.getElementById("carrierIn");
        const file = fi.files[0];

        if (!msg && !file) {
          klog("ERR: Nothing to send.", "e");
          return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Encoding…';

        let b64 = null;
        let fileType = "image/png"; // Default

        if (file) {
          fileType = file.type; // This will be "application/pdf" for PDFs
          b64 = await new Promise((res) => {
            const r = new FileReader();
            r.onload = (e) => res(e.target.result);
            r.readAsDataURL(file);
          });
        }

        klog(`Tunneling ${fileType}…`, "i");

        // We send the file_type so the Python backend knows which logic to use
        socket.emit("send_secure_msg", {
          msg,
          password: myPass,
          carrier: b64,
          file_type: fileType,
          room: myRoom,
          codename: myCodename,
        });

        document.getElementById("msgIn").value = "";
        fi.value = ""; // Clear file after sending
        document.getElementById("carrierLbl").textContent =
          "Select carrier file";
        btn.disabled = false;
        btn.innerHTML =
          '<i class="fas fa-paper-plane" style="margin-right:8px"></i>Execute Protocol Send';
      }

      socket.on("sent_confirmation", () =>
        klog(`Packet tunneled → ${myRoom}.`, "s"),
      );

      // ── RECEIVE ───────────────────────────────────────────────
      socket.on("new_stego_packet", (data) => {
        document.getElementById("emptyFeed")?.remove();
        pCount++;
        document.getElementById("pktCnt").textContent =
          `${pCount} Packet${pCount !== 1 ? "s" : ""}`;

        const feed = document.getElementById("feed");
        const card = document.createElement("div");
        card.className = "pkt";

        const sender = data.codename || "UNKNOWN";
        const isPDF = data.file_type === "application/pdf";
        const fileType = data.file_type || "image/png";

        const previewContent = isPDF
          ? `<div style="height:110px; display:flex; align-items:center; justify-content:center; background:#1a0808; color:var(--red); font-size:30px;"><i class="fas fa-file-pdf"></i></div>`
          : `<img src="${data.image.startsWith("data") ? data.image : "data:image/png;base64," + data.image}" alt="pkt"/>`;

        // UPDATED: Overlay now contains two separate clickable icons instead of one global click
        card.innerHTML = `
    ${previewContent}
    <div class="pkt-overlay">
      <div style="display: flex; gap: 20px;">
        <div class="pkt-icon" onclick="downloadPacket('${data.image}', '${fileType}')" title="Download File">
          <i class="fas fa-file-download"></i>
        </div>
        <div class="pkt-icon" onclick="manualDecode('${data.image}', '${sender}', '${fileType}')" title="Extract Secret">
          <i class="fas fa-unlock-alt" style="color:var(--green)"></i>
        </div>
      </div>
      <div class="pkt-lbl">Actions</div>
    </div>
    <div class="pkt-meta">
      <span class="pkt-num">#${pCount}</span>
      <span class="pkt-sender">${sender}</span>
    </div>
  `;

        feed.prepend(card);
        klog(
          `[INBOUND] ${isPDF ? "PDF Document" : "Image Packet"} from ${sender}.`,
          "w",
        );

        if (autoDecrypt && myPass) {
          socket.emit("decrypt_packet", {
            image: data.image,
            password: myPass,
            file_type: data.file_type,
            bit_depth: data.bit_depth || 1,
          });
        }
      });

      function downloadPacket(base64Data, type) {
        const link = document.createElement("a");

        // Ensure the base64 has the correct header
        const uri = base64Data.startsWith("data:")
          ? base64Data
          : `data:${type};base64,${base64Data}`;

        link.href = uri;
        link.download = type.includes("pdf")
          ? `secret_${Date.now()}.pdf`
          : `stego_${Date.now()}.png`;

        // Append to body to make it "clickable" in some browsers
        document.body.appendChild(link);
        link.click();

        // CRITICAL FIX: Remove only the link, NOT the body
        document.body.removeChild(link);

        klog("File downloaded successfully.", "s");
      }

      // Helper to download the file directly from the socket packet
      function manualDownload(b64Data, type) {
        const a = document.createElement("a");
        a.href = b64Data;
        a.download = type.includes("pdf") ? "secret.pdf" : "stego.png";
        a.click();
      }

      function manualDecode(b64, sender, type) {
        if (!myPass) {
          klog("ERR: No AES key set.", "e");
          return;
        }
        klog(
          `Decrypting ${type.includes("pdf") ? "PDF" : "Image"} from ${sender}...`,
          "i",
        );
        socket.emit("decrypt_packet", {
          image: b64,
          password: myPass,
          file_type: type,
        });
      }

      socket.on("decrypted_result", (data) => {
        const fail =
          data.msg.toLowerCase().includes("fail") ||
          data.msg.toLowerCase().includes("invalid");
        if (fail) {
          klog("Decryption failed — wrong key or corrupt packet.", "e");
        } else {
          const s = document.getElementById("stream");
          const box = document.createElement("div");
          box.className = "decoded-box";
          box.innerHTML = `<div class="decoded-sender">↓ Decoded Payload</div>${esc(data.msg)}`;
          s.appendChild(box);
          s.scrollTop = s.scrollHeight;
        }
      });

      socket.on("error", (d) => klog(`FATAL: ${d.message}`, "e"));

      function esc(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function klog(msg, t = "i") {
        const s = document.getElementById("stream");
        const e = document.createElement("div");
        e.className = "ke";
        const ts = new Date().toLocaleTimeString("en-GB", { hour12: false });
        e.innerHTML = `<span class="kts">${ts}</span><span class="c-${t}">${msg}</span>`;
        s.appendChild(e);
        s.scrollTop = s.scrollHeight;
      }
      function clearStream() {
        document.getElementById("stream").innerHTML = "";
        klog("Stream cleared.");
      }

      document.getElementById("msgIn").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendSecret();
        }
      });
    </script>
  </body>
</html>
